version: 2

models:
  - name: stg_orders
    description: "Pedidos realizados na plataforma, um registro por pedido."
    columns:
      - name: order_id
        description: "Identificador único do pedido."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Identificador do cliente que fez o pedido."
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: order_status
        description: "Status atual do pedido (delivered, shipped, canceled, etc.)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['delivered', 'shipped', 'canceled', 'unavailable', 'invoiced', 'processing', 'created', 'approved']

  - name: stg_order_items
    description: "Itens de cada pedido, um registro por item/produto dentro de um pedido."
    columns:
      - name: order_id
        description: "Identificador do pedido ao qual o item pertence."
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: product_id
        description: "Identificador do produto."
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: seller_id
        description: "Identificador do vendedor responsável pelo item."
        tests:
          - not_null
          - relationships:
              to: ref('stg_sellers')
              field: seller_id
      - name: price
        description: "Preço do item, sem frete."
        tests:
          - not_null

  - name: stg_products
    description: "Catálogo de produtos vendidos na plataforma."
    columns:
      - name: product_id
        description: "Identificador único do produto."
        tests:
          - unique
          - not_null
      - name: product_category_name
        description: "Categoria do produto (em português)."

  - name: stg_sellers
    description: "Vendedores cadastrados na plataforma."
    columns:
      - name: seller_id
        description: "Identificador único do vendedor."
        tests:
          - unique
          - not_null

  - name: stg_customers
    description: "Clientes que realizaram pedidos. Cada order_id tem um customer_id próprio, mas customer_unique_id identifica a pessoa de fato."
    columns:
      - name: customer_id
        description: "Identificador do cliente associado a um pedido específico."
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        description: "Identificador único da pessoa, reutilizado entre pedidos diferentes do mesmo cliente."
        tests:
          - not_null

  - name: stg_geolocation
    description: "Coordenadas geográficas associadas a prefixos de CEP brasileiros."
    columns:
      - name: geolocation_zip_code_prefix
        description: "Prefixo do CEP."
        tests:
          - not_null

  - name: stg_payments
    description: "Pagamentos realizados por pedido, podendo haver múltiplos registros por pedido (parcelas ou métodos combinados)."
    columns:
      - name: order_id
        description: "Identificador do pedido pago."
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: payment_type
        description: "Forma de pagamento utilizada (credit_card, boleto, voucher, etc.)."
        tests:
          - not_null
      - name: payment_value
        description: "Valor pago neste registro de pagamento."
        tests:
          - not_null

  - name: stg_reviews
    description: "Avaliações de pedidos feitas pelos clientes."
    columns:
      - name: review_id
        description: "Identificador único da avaliação."
        tests:
          - not_null
      - name: order_id
        description: "Identificador do pedido avaliado."
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: review_score
        description: "Nota da avaliação, de 1 a 5."
        tests:
          - not_null

  - name: stg_product_category_translation
    description: "Tradução dos nomes de categoria de produto, de português para inglês."
    columns:
      - name: product_category_name
        description: "Nome da categoria em português."
        tests:
          - unique
          - not_null
      - name: product_category_name_english
        description: "Nome da categoria traduzido para inglês."